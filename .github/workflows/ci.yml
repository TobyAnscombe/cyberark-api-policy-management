---
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
jobs:
  secret-scan:
    uses: TobyAnscombe/github-actions/.github/workflows/gitleaks.yml@main
    permissions:
      security-events: write

  ansible-lint:
    uses: TobyAnscombe/github-actions/.github/workflows/ansible-ci.yml@main
    with:
      ansible_lint_version: "26.1.0"
      requirements_file: ""

  protect-main:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [secret-scan, ansible-lint]
    uses: TobyAnscombe/github-actions/.github/workflows/branch-protection.yml@main
    permissions:
      administration: write
    with:
      required_checks: '["secret-scan / Scan for secrets", "ansible-lint / Lint Ansible"]'
