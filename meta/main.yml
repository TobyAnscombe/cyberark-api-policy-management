---
galaxy_info:
  author: TobyAnscombe
  namespace: tobyanscombe
  role_name: cyberark_sia_policy_management
  description: >-
    Idempotently creates, updates, or deletes CyberArk SIA access control policies
    (VM, DB, Cloud Console, and Entra Group) via the UAP REST API
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: EL
      versions: ["8", "9"]
    - name: Ubuntu
      versions: [bionic, focal, jammy, noble]
    - name: Debian
      versions: [bullseye, bookworm]

# cyberark_token must be present on the play before this role runs.
# Supply it via cyberark_api_authentication (listed below) or by another means.
dependencies:
  - src: https://github.com/TobyAnscombe/cyberark-api-management
    name: cyberark_api_authentication
    version: v1.1.0
